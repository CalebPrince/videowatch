<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify Email — VideoWatch</title>
  <meta name="description" content="Verify your email address to activate your VideoWatch account." />
  <meta name="robots" content="noindex" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root { --brand: #0f766e; --brand-light: #ccfbf1; }
    [data-theme="dark"] {
      --bs-body-bg: #0f172a; --bs-body-color: #e2e8f0;
      --bs-card-bg: #1e293b; --bs-border-color: #334155;
    }
    body { background: var(--bs-body-bg); color: var(--bs-body-color);
           display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .card { background: var(--bs-card-bg); border: 1px solid var(--bs-border-color);
            border-radius: 12px; padding: 2.5rem; max-width: 420px; width: 100%; text-align:center; }
    .icon-wrap { width:72px; height:72px; border-radius:50%; display:flex;
                 align-items:center; justify-content:center; margin:0 auto 1.25rem; font-size:2rem; }
    .icon-wrap.success { background: #d1fae5; color: #059669; }
    .icon-wrap.error   { background: #fee2e2; color: #dc2626; }
    .icon-wrap.loading { background: var(--brand-light); color: var(--brand); }
    .brand { color: var(--brand); font-weight:700; text-decoration:none; font-size:1.1rem; }
  </style>
</head>
<body>
<div class="card shadow-sm">
  <div id="icon-wrap" class="icon-wrap loading">
    <i class="bi bi-envelope-check"></i>
  </div>
  <h5 id="title" class="mb-2">Verifying your email…</h5>
  <p id="message" class="text-muted mb-4">Please wait a moment.</p>
  <div id="actions"></div>
  <hr class="my-3" />
  <a href="/" class="brand"><i class="bi bi-camera-video-fill me-1"></i>VideoWatch</a>
</div>

<script>
  (function () {
    const token = new URLSearchParams(location.search).get('token');
    const iconEl = document.getElementById('icon-wrap');
    const titleEl = document.getElementById('title');
    const msgEl   = document.getElementById('message');
    const actEl   = document.getElementById('actions');

    function setTheme() {
      const saved = localStorage.getItem('vw_theme');
      const dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }
    setTheme();

    function showResult(ok, title, msg, actions) {
      iconEl.className = 'icon-wrap ' + (ok ? 'success' : 'error');
      iconEl.innerHTML = ok
        ? '<i class="bi bi-check-circle-fill"></i>'
        : '<i class="bi bi-x-circle-fill"></i>';
      titleEl.textContent = title;
      msgEl.textContent = msg;
      actEl.innerHTML = actions;
    }

    if (!token) {
      showResult(false, 'Missing token', 'No verification token found in this link.',
        '<a href="/register" class="btn btn-sm btn-outline-secondary">Register again</a>');
      return;
    }

    fetch('/api/auth/verify-email?token=' + encodeURIComponent(token))
      .then(r => r.json().then(d => ({ ok: r.ok, data: d })))
      .then(({ ok, data }) => {
        if (ok) {
          showResult(true, 'Email verified!',
            'Your account is now active. You can sign in.',
            '<a href="/login" class="btn btn-sm" style="background:var(--brand);color:#fff">Sign in</a>');
        } else {
          const expired = (data.detail || '').toLowerCase().includes('expired');
          showResult(false, 'Verification failed', data.detail || 'Something went wrong.',
            expired
              ? '<a href="/register" class="btn btn-sm btn-outline-secondary">Register again</a>'
              : '<a href="/login" class="btn btn-sm btn-outline-secondary">Go to login</a>');
        }
      })
      .catch(() => {
        showResult(false, 'Network error', 'Could not reach the server. Please try again.',
          '<a href="/login" class="btn btn-sm btn-outline-secondary">Go to login</a>');
      });
  })();
</script>
</body>
</html>
