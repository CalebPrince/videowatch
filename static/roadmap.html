<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roadmap — VideoWatch</title>
  <meta name="description" content="See what's coming to VideoWatch and vote for the features you want most." />
  <link rel="canonical" href="https://videowatch.duckdns.org/roadmap" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --brand: #4f8ef7;
      --bg: #f8fafc;
      --card: #fff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
    nav { background: var(--card); border-bottom: 1px solid var(--border); padding: .75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    nav a { color: var(--brand); text-decoration: none; font-weight: 700; font-size: 1.1rem; }
    nav .nav-links a { color: var(--muted); font-size: .88rem; margin-left: 1.25rem; text-decoration: none; }
    nav .nav-links a:hover { color: var(--brand); }
    .hero { text-align: center; padding: 3.5rem 1rem 2rem; }
    .hero h1 { font-size: 2rem; font-weight: 800; margin-bottom: .5rem; }
    .hero p { color: var(--muted); max-width: 480px; margin: 0 auto; font-size: .95rem; }
    .status-tabs { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; margin: 1.5rem 0 2rem; }
    .status-tab { padding: .3rem .85rem; border-radius: 99px; border: 1px solid var(--border); font-size: .8rem; cursor: pointer; background: var(--card); color: var(--muted); transition: all .15s; }
    .status-tab.active, .status-tab:hover { background: var(--brand); color: #fff; border-color: var(--brand); }
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; max-width: 960px; margin: 0 auto; padding: 0 1rem 3rem; }
    .item-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.25rem 1rem; display: flex; flex-direction: column; gap: .6rem; transition: box-shadow .15s; }
    .item-card:hover { box-shadow: 0 4px 20px #0001; }
    .item-badge { display: inline-flex; align-items: center; gap: .3rem; font-size: .7rem; font-weight: 700; padding: .2rem .6rem; border-radius: 99px; width: fit-content; }
    .badge-planned    { background: #eff6ff; color: #3b82f6; }
    .badge-in-progress { background: #fef3c7; color: #d97706; }
    .badge-done       { background: #dcfce7; color: #16a34a; }
    [data-theme="dark"] .badge-planned    { background: #1e3a5f; color: #93c5fd; }
    [data-theme="dark"] .badge-in-progress { background: #451a03; color: #fcd34d; }
    [data-theme="dark"] .badge-done       { background: #14532d; color: #86efac; }
    .item-title { font-weight: 700; font-size: .95rem; }
    .item-desc { font-size: .82rem; color: var(--muted); line-height: 1.5; flex: 1; }
    .vote-btn { display: flex; align-items: center; gap: .4rem; background: none; border: 1px solid var(--border); border-radius: 8px; padding: .35rem .8rem; font-size: .82rem; cursor: pointer; color: var(--muted); transition: all .15s; margin-top: .25rem; align-self: flex-start; }
    .vote-btn.voted { background: #eff6ff; border-color: var(--brand); color: var(--brand); font-weight: 600; }
    [data-theme="dark"] .vote-btn.voted { background: #1e3a5f; }
    .vote-btn:hover:not(.voted) { border-color: var(--brand); color: var(--brand); }
    .no-items { text-align: center; color: var(--muted); padding: 3rem; grid-column: 1/-1; }
    footer { text-align: center; padding: 1.5rem; font-size: .78rem; color: var(--muted); border-top: 1px solid var(--border); }
    footer a { color: var(--muted); }
  </style>
  <script>
    const _t = localStorage.getItem('vw_theme');
    if (_t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</head>
<body>
  <nav>
    <a href="/"><i class="bi bi-play-circle-fill me-2" style="color:var(--brand)"></i>VideoWatch</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/login">Sign in</a>
      <a href="/register">Register</a>
    </div>
  </nav>

  <div class="hero">
    <h1><i class="bi bi-map me-2" style="color:var(--brand)"></i>Product Roadmap</h1>
    <p>Here's what we're building. Sign in to vote on the features you want most — your votes shape our priorities.</p>
  </div>

  <div class="status-tabs">
    <button class="status-tab active" data-filter="all">All</button>
    <button class="status-tab" data-filter="planned">Planned</button>
    <button class="status-tab" data-filter="in-progress">In Progress</button>
    <button class="status-tab" data-filter="done">Done</button>
  </div>

  <div class="items-grid" id="items-grid">
    <div class="no-items"><i class="bi bi-hourglass-split" style="font-size:2rem;display:block;margin-bottom:.5rem;"></i>Loading…</div>
  </div>

  <footer>
    <a href="/">VideoWatch</a> &mdash; <a href="/terms">Terms</a> &mdash; <a href="/roadmap">Roadmap</a>
  </footer>

  <script>
    let _items = [], _filter = 'all', _authed = false;

    async function init() {
      // Check if logged in
      try {
        const r = await fetch('/api/auth/status');
        const d = await r.json();
        _authed = !!d.authenticated;
      } catch(e) {}

      const r = await fetch('/api/roadmap?' + Date.now());
      _items = r.ok ? await r.json() : [];
      render();
    }

    function statusLabel(s) {
      if (s === 'in-progress') return 'In Progress';
      if (s === 'done') return 'Done';
      return 'Planned';
    }
    function statusIcon(s) {
      if (s === 'in-progress') return 'bi-hammer';
      if (s === 'done') return 'bi-check-circle-fill';
      return 'bi-lightbulb';
    }

    function render() {
      const grid = document.getElementById('items-grid');
      const visible = _filter === 'all' ? _items : _items.filter(i => i.status === _filter);
      if (!visible.length) {
        grid.innerHTML = '<div class="no-items"><i class="bi bi-inbox" style="font-size:2rem;display:block;margin-bottom:.5rem;"></i>Nothing here yet.</div>';
        return;
      }
      grid.innerHTML = visible.map(item => `
        <div class="item-card" data-id="${item.id}">
          <div class="item-badge badge-${item.status}"><i class="bi ${statusIcon(item.status)}"></i>${statusLabel(item.status)}</div>
          <div class="item-title">${item.title}</div>
          ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
          <button class="vote-btn ${item.voted ? 'voted' : ''}" onclick="vote('${item.id}')">
            <i class="bi bi-arrow-up-circle${item.voted ? '-fill' : ''}"></i>
            <span class="vote-count">${item.votes}</span>
            <span>${item.voted ? 'Voted' : 'Upvote'}</span>
          </button>
        </div>`).join('');
    }

    async function vote(id) {
      if (!_authed) { window.location.href = '/login'; return; }
      const r = await fetch(`/api/roadmap/vote/${id}`, { method: 'POST' });
      if (!r.ok) return;
      const d = await r.json();
      const item = _items.find(i => i.id === id);
      if (item) { item.votes = d.votes; item.voted = d.voted; }
      render();
    }

    document.querySelectorAll('.status-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.status-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _filter = btn.dataset.filter;
        render();
      });
    });

    init();
  </script>
</body>
</html>
