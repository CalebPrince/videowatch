<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VideoWatch Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --brand: #0f766e;
      --accent: #f59e0b;
      --ink: #0f172a;
      --muted: #64748b;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(800px 420px at 10% 0%, rgba(15,118,110,.18), transparent 60%),
        radial-gradient(900px 460px at 100% 100%, rgba(245,158,11,.14), transparent 60%),
        #eef3f2;
      color: var(--ink);
      font-family: 'IBM Plex Sans', 'Trebuchet MS', 'Segoe UI', sans-serif;
      padding: 1rem;
    }
    .auth-card {
      width: min(440px, 96vw);
      background: rgba(255,255,255,.92);
      border: 1px solid #d7e2df;
      border-radius: 18px;
      box-shadow: 0 22px 50px rgba(15, 23, 42, .15);
      padding: 1.2rem;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: .25rem;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .brand i {
      color: var(--brand);
      font-size: 1.35rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 1rem;
    }
    .btn-brand {
      width: 100%;
      border: none;
      border-radius: 10px;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #14b8a6);
      box-shadow: 0 10px 22px rgba(15,118,110,.25);
    }
    .hint {
      margin-top: .75rem;
      color: var(--muted);
      font-size: .8rem;
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <div class="brand"><i class="bi bi-shield-lock"></i><span>VideoWatch Login</span></div>
    <div class="subtitle">Sign in to access monitoring and scan controls.</div>

    <form id="login-form" class="d-grid gap-3">
      <div>
        <label for="username" class="form-label mb-1">Username</label>
        <input id="username" class="form-control" autocomplete="username" required />
      </div>
      <div>
        <label for="password" class="form-label mb-1">Password</label>
        <input id="password" type="password" class="form-control" autocomplete="current-password" required />
      </div>
      <button id="btn-login" class="btn btn-brand" type="submit">
        <i class="bi bi-box-arrow-in-right me-1"></i>Login
      </button>
      <div id="err" class="text-danger small" style="display:none;"></div>
    </form>

    <div class="hint">Tip: configure credentials via env vars: VIDEOWATCH_AUTH_USERNAME and VIDEOWATCH_AUTH_PASSWORD.</div>
  </main>

  <script>
    const API = (() => {
      const configured = window.localStorage.getItem('videowatch_api_base');
      if (configured) {
        try {
          const url = new URL(configured, window.location.origin);
          if (url.origin === window.location.origin) {
            const path = (url.pathname || '').replace(/\/+$/, '');
            if (path === '/api' || path.endsWith('/api')) {
              return `${url.origin}${path}`;
            }
          }
          window.localStorage.removeItem('videowatch_api_base');
        } catch (_) {
          window.localStorage.removeItem('videowatch_api_base');
        }
      }
      return `${window.location.origin}/api`;
    })();

    async function api(path, opts = {}) {
      const r = await fetch(API + path, {
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        ...opts,
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        throw new Error(err.detail || r.statusText);
      }
      return r.json();
    }

    (async () => {
      try {
        const st = await api('/auth/status');
        if (!st.enabled || st.authenticated) {
          window.location.href = '/';
        }
      } catch (_) {}
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.style.display = 'none';
      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Signing in...';
      try {
        await api('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        window.location.href = '/';
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>Login';
      }
    });
  </script>
</body>
</html>
