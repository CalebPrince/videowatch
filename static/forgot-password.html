<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password — VideoWatch</title>
  <script>
    const _t = localStorage.getItem('vw_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', _t);
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root { --brand: #0f766e; --ink: #0f172a; --muted: #64748b; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh; margin: 0; display: grid; place-items: center;
      background:
        radial-gradient(800px 420px at 10% 0%, rgba(15,118,110,.18), transparent 60%),
        radial-gradient(900px 460px at 100% 100%, rgba(245,158,11,.14), transparent 60%),
        #eef3f2;
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; padding: 1rem;
    }
    .auth-card {
      width: min(420px, 96vw);
      background: rgba(255,255,255,.92);
      border: 1px solid #d7e2df;
      border-radius: 18px;
      box-shadow: 0 22px 50px rgba(15,23,42,.15);
      padding: 2rem 1.75rem;
    }
    .brand { color: var(--brand); font-weight: 800; font-size: 1.1rem; text-decoration: none; }
    .brand i { margin-right: .35rem; }
    .btn-brand {
      width: 100%; border: none; border-radius: 10px; color: #fff; padding: .7rem;
      background: linear-gradient(135deg, var(--brand), #14b8a6);
      box-shadow: 0 10px 22px rgba(15,118,110,.25); font-weight: 700; font-size: .95rem; cursor: pointer;
    }
    .btn-brand:disabled { opacity: .6; cursor: not-allowed; }
    .form-control {
      border: 1.5px solid #d7e2df; border-radius: 10px; padding: .6rem .85rem;
      font-size: .9rem; width: 100%;
    }
    .form-control:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,118,110,.12); }
    #msg { display: none; font-size: .83rem; padding: .6rem .85rem; border-radius: 9px; margin-bottom: .75rem; }
    .msg-success { background: rgba(5,150,105,.08); border: 1px solid rgba(5,150,105,.25); color: #059669; }
    .msg-error   { background: rgba(220,38,38,.08);  border: 1px solid rgba(220,38,38,.25);  color: #dc2626; }
    [data-theme="dark"] body { background: radial-gradient(800px 420px at 10% 0%, rgba(15,118,110,.1), transparent 60%), radial-gradient(900px 460px at 100% 100%, rgba(245,158,11,.07), transparent 60%), #0f172a; }
    [data-theme="dark"] .auth-card { background: rgba(30,41,59,.97); border-color: #334155; color: #e2e8f0; }
    [data-theme="dark"] .form-control { background: #0f172a; color: #e2e8f0; border-color: #334155; }
    [data-theme="dark"] .form-control:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,118,110,.18); }
  </style>
</head>
<body>
<div class="auth-card">
  <a href="/" class="brand"><i class="bi bi-play-circle-fill"></i>VideoWatch</a>
  <h5 style="font-weight:800;margin:1rem 0 .25rem">Forgot your password?</h5>
  <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.25rem">
    Enter your email address and we'll send you a link to reset your password.
  </p>

  <div id="msg"></div>

  <form id="form" novalidate>
    <div style="margin-bottom:1rem">
      <label style="font-size:.82rem;font-weight:600;display:block;margin-bottom:.35rem" for="email">Email address</label>
      <input id="email" class="form-control" type="email" placeholder="you@example.com" autocomplete="email" required />
    </div>
    <button class="btn-brand" id="btn" type="submit">
      <i class="bi bi-envelope-arrow-up me-1"></i>Send reset link
    </button>
  </form>

  <div style="text-align:center;margin-top:1.25rem;font-size:.83rem;color:var(--muted)">
    Remembered it? <a href="/login" style="color:var(--brand);font-weight:600;text-decoration:none">Sign in</a>
  </div>
</div>

<script>
  const API = window.location.origin + '/api';

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById('msg');
    const btn   = document.getElementById('btn');
    const email = document.getElementById('email').value.trim();
    msgEl.style.display = 'none';

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Sending…';

    try {
      const r = await fetch(API + '/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const d = await r.json();
      msgEl.className = r.ok ? 'msg-success' : 'msg-error';
      msgEl.textContent = r.ok ? d.message : (d.detail || 'Something went wrong.');
      msgEl.style.display = 'block';
      if (r.ok) {
        document.getElementById('form').style.display = 'none';
      }
    } catch {
      msgEl.className = 'msg-error';
      msgEl.textContent = 'Network error. Please try again.';
      msgEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-envelope-arrow-up me-1"></i>Send reset link';
    }
  });
</script>
</body>
</html>
