<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password — VideoWatch</title>
  <meta name="description" content="Choose a new password for your VideoWatch account." />
  <meta name="robots" content="noindex" />
  <script>
    const _t = localStorage.getItem('vw_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', _t);
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root { --brand: #0f766e; --ink: #0f172a; --muted: #64748b; --border: #d7e2df; }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh; margin: 0; display: grid; place-items: center;
      background:
        radial-gradient(800px 420px at 10% 0%, rgba(15,118,110,.18), transparent 60%),
        radial-gradient(900px 460px at 100% 100%, rgba(245,158,11,.14), transparent 60%),
        #eef3f2;
      font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; padding: 1rem;
    }
    .auth-card {
      width: min(420px, 96vw);
      background: rgba(255,255,255,.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 22px 50px rgba(15,23,42,.15);
      padding: 2rem 1.75rem;
    }
    .brand { color: var(--brand); font-weight: 800; font-size: 1.1rem; text-decoration: none; }
    .brand i { margin-right: .35rem; }
    .btn-brand {
      width: 100%; border: none; border-radius: 10px; color: #fff; padding: .7rem;
      background: linear-gradient(135deg, var(--brand), #14b8a6);
      box-shadow: 0 10px 22px rgba(15,118,110,.25); font-weight: 700; font-size: .95rem; cursor: pointer;
      margin-top: .5rem;
    }
    .btn-brand:disabled { opacity: .6; cursor: not-allowed; }
    .form-control {
      border: 1.5px solid var(--border); border-radius: 10px; padding: .6rem .85rem;
      font-size: .9rem; width: 100%;
    }
    .form-control:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,118,110,.12); }
    .field-wrap { margin-bottom: 1rem; }
    .field-label { font-size: .82rem; font-weight: 600; display: block; margin-bottom: .35rem; }
    .strength-bar-wrap { height: 4px; background: #e2e8f0; border-radius: 99px; margin-top: .5rem; overflow: hidden; }
    .strength-bar { height: 100%; border-radius: 99px; width: 0; transition: width .3s, background .3s; }
    .strength-label { font-size: .7rem; margin-top: .25rem; font-weight: 600; }
    #msg { display: none; font-size: .83rem; padding: .6rem .85rem; border-radius: 9px; margin-bottom: .75rem; }
    .msg-success { background: rgba(5,150,105,.08); border: 1px solid rgba(5,150,105,.25); color: #059669; }
    .msg-error   { background: rgba(220,38,38,.08);  border: 1px solid rgba(220,38,38,.25);  color: #dc2626; }
    [data-theme="dark"] body { background: radial-gradient(800px 420px at 10% 0%, rgba(15,118,110,.1), transparent 60%), radial-gradient(900px 460px at 100% 100%, rgba(245,158,11,.07), transparent 60%), #0f172a; }
    [data-theme="dark"] .auth-card { background: rgba(30,41,59,.97); border-color: #334155; color: #e2e8f0; }
    [data-theme="dark"] .form-control { background: #0f172a; color: #e2e8f0; border-color: #334155; }
    [data-theme="dark"] .form-control:focus { border-color: var(--brand); }
    [data-theme="dark"] .field-label { color: #e2e8f0; }
    [data-theme="dark"] .strength-bar-wrap { background: #1e293b; }
    [data-theme="dark"] .btn-outline-secondary { color: #94a3b8; border-color: #475569; }
    [data-theme="dark"] .btn-outline-secondary:hover { background: #334155; color: #e2e8f0; }
  </style>
</head>
<body>
<div class="auth-card" id="card">
  <a href="/" class="brand"><i class="bi bi-play-circle-fill"></i>VideoWatch</a>
  <h5 style="font-weight:800;margin:1rem 0 .25rem">Choose a new password</h5>
  <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.25rem">
    Enter and confirm your new password below.
  </p>

  <div id="msg"></div>

  <form id="form" novalidate>
    <div class="field-wrap">
      <label class="field-label" for="password">New password</label>
      <div class="input-group">
        <input id="password" class="form-control" type="password"
          placeholder="At least 8 characters" autocomplete="new-password" required
          style="border-radius:10px 0 0 10px;" />
        <button type="button" class="btn btn-outline-secondary" id="toggle-pwd" tabindex="-1"
          style="border-radius:0 10px 10px 0;border-left:none;">
          <i class="bi bi-eye" id="toggle-icon"></i>
        </button>
      </div>
      <div class="strength-bar-wrap"><div class="strength-bar" id="strength-bar"></div></div>
      <div class="strength-label" id="strength-label" style="color:var(--muted)"></div>
    </div>

    <div class="field-wrap">
      <label class="field-label" for="confirm">Confirm new password</label>
      <input id="confirm" class="form-control" type="password"
        placeholder="Repeat your password" autocomplete="new-password" required />
    </div>

    <button class="btn-brand" id="btn" type="submit">
      <i class="bi bi-shield-check me-1"></i>Reset password
    </button>
  </form>
</div>

<script>
  const API = window.location.origin + '/api';
  const token = new URLSearchParams(location.search).get('token');

  if (!token) {
    document.getElementById('form').style.display = 'none';
    const msg = document.getElementById('msg');
    msg.className = 'msg-error';
    msg.textContent = 'No reset token found. Please request a new password reset link.';
    msg.style.display = 'block';
  }

  document.getElementById('toggle-pwd').addEventListener('click', () => {
    const inp = document.getElementById('password');
    const icon = document.getElementById('toggle-icon');
    const hidden = inp.type === 'password';
    inp.type = hidden ? 'text' : 'password';
    icon.className = hidden ? 'bi bi-eye-slash' : 'bi bi-eye';
  });

  document.getElementById('password').addEventListener('input', function () {
    const val = this.value;
    const bar = document.getElementById('strength-bar');
    const lbl = document.getElementById('strength-label');
    let score = 0;
    if (val.length >= 8)  score++;
    if (val.length >= 12) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
      { pct: '0%',   color: 'transparent', text: '' },
      { pct: '20%',  color: '#ef4444', text: 'Very weak' },
      { pct: '40%',  color: '#f97316', text: 'Weak' },
      { pct: '60%',  color: '#f59e0b', text: 'Fair' },
      { pct: '80%',  color: '#22c55e', text: 'Strong' },
      { pct: '100%', color: '#0f766e', text: 'Very strong' },
    ];
    const lvl = val.length === 0 ? levels[0] : levels[Math.max(1, score)];
    bar.style.width = lvl.pct;
    bar.style.background = lvl.color;
    lbl.textContent = lvl.text;
    lbl.style.color = lvl.color;
  });

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msgEl = document.getElementById('msg');
    const btn   = document.getElementById('btn');
    msgEl.style.display = 'none';

    const new_password     = document.getElementById('password').value;
    const confirm_password = document.getElementById('confirm').value;

    if (new_password !== confirm_password) {
      msgEl.className = 'msg-error';
      msgEl.textContent = 'Passwords do not match.';
      msgEl.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Resetting…';

    try {
      const r = await fetch(API + '/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, new_password, confirm_password }),
      });
      const d = await r.json();
      if (r.ok) {
        document.getElementById('card').innerHTML = `
          <div style="text-align:center;padding:1rem 0">
            <div style="width:72px;height:72px;border-radius:50%;background:#d1fae5;color:#059669;
                        display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1.25rem">
              <i class="bi bi-shield-check-fill"></i>
            </div>
            <h5 style="font-weight:800;margin-bottom:.5rem">Password reset!</h5>
            <p style="color:var(--muted);font-size:.9rem;margin-bottom:1.5rem">
              Your password has been updated. You can now sign in with your new password.
            </p>
            <a href="/login"
               style="display:inline-block;padding:10px 28px;background:#0f766e;color:#fff;
                      text-decoration:none;border-radius:8px;font-weight:700">
              Sign in
            </a>
          </div>
        `;
      } else {
        msgEl.className = 'msg-error';
        msgEl.textContent = d.detail || 'Something went wrong.';
        msgEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-shield-check me-1"></i>Reset password';
        if ((d.detail || '').toLowerCase().includes('expired')) {
          setTimeout(() => { window.location.href = '/forgot-password'; }, 3000);
        }
      }
    } catch {
      msgEl.className = 'msg-error';
      msgEl.textContent = 'Network error. Please try again.';
      msgEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-shield-check me-1"></i>Reset password';
    }
  });
</script>
</body>
</html>
